# Pipeline configuration — 7-node SDLC flow (FR-26, FR-33).
# DAG: specification → design → decision → implementation(build, verify)
#      ; optimize(run_on:always), tech-lead-review(run_on:always)
# See: documents/requirements-sdlc.md for stage specifications.

name: "auto-flow-sdlc"
version: "1"

defaults:
  max_parallel: 2
  max_continuations: 3
  timeout_seconds: 1800
  max_retries: 3
  retry_delay_seconds: 5
  model: claude-sonnet-4-6
  claude_args:
    - "--dangerously-skip-permissions"
  on_failure_script: .auto-flow/scripts/rollback-uncommitted.sh
  hitl:
    ask_script: .auto-flow/scripts/hitl-ask.sh
    check_script: .auto-flow/scripts/hitl-check.sh
    artifact_source: plan/specification/01-spec.md
    poll_interval: 60
    timeout: 7200
    exclude_login: "github-actions[bot]"

phases:
  plan: [specification, design, decision]
  impl: [implementation]
  report: [optimize, tech-lead-review]

nodes:
  # Stage 1: Project Manager — specification
  specification:
    type: agent
    phase: plan
    label: "Project Manager — Specification"
    prompt: ".auto-flow/agents/agent-pm/SKILL.md"
    task_template: |
      Select a GitHub issue to implement. Prefer issues labeled "in-progress"; fall back to any open issue.
      Output:
        - {{node_dir}}/01-spec.md (YAML frontmatter with `issue: <N>` and `scope: <engine|sdlc|engine+sdlc>`,
          then problem, affected requirements, SRS changes, scope boundaries)
        - Update the target SRS file(s) based on issue scope (see Scope Detection in prompt)
    validate:
      - type: file_exists
        path: "{{node_dir}}/01-spec.md"
      - type: file_not_empty
        path: "{{node_dir}}/01-spec.md"
      - type: frontmatter_field
        path: "{{node_dir}}/01-spec.md"
        field: issue
      - type: frontmatter_field
        path: "{{node_dir}}/01-spec.md"
        field: scope
      - type: contains_section
        path: "{{node_dir}}/01-spec.md"
        value: "Problem Statement"
      - type: contains_section
        path: "{{node_dir}}/01-spec.md"
        value: "Scope"
      - type: contains_section
        path: "{{node_dir}}/01-spec.md"
        value: "Summary"

  # Stage 2: Architect — design-solution plan with variants
  design:
    type: agent
    phase: plan
    label: "Architect — Design-Solution Plan"
    model: claude-opus-4-6
    inputs: [specification]
    prompt: ".auto-flow/agents/agent-architect/SKILL.md"
    task_template: |
      Read the specification at {{input.specification}}/01-spec.md.
      Read ONLY scope-relevant SRS/SDS docs (derive scope from spec frontmatter `scope:` field).
      Produce an implementation plan with 2-3 variants.
      Output: {{node_dir}}/02-plan.md
    validate:
      - type: file_exists
        path: "{{node_dir}}/02-plan.md"
      - type: file_not_empty
        path: "{{node_dir}}/02-plan.md"
      - type: contains_section
        path: "{{node_dir}}/02-plan.md"
        value: "Summary"

  # Stage 3: Tech Lead — critique, decision, SDS update, branch + draft PR
  decision:
    type: agent
    phase: plan
    label: "Tech Lead — Decision + Branch + PR"
    model: claude-opus-4-6
    inputs: [specification, design]
    prompt: ".auto-flow/agents/agent-tech-lead/SKILL.md"
    task_template: |
      Read the plan at {{input.design}}/02-plan.md.
      Read the spec at {{input.specification}}/01-spec.md.
      Read ONLY scope-relevant SRS/SDS docs (derive scope from spec frontmatter `scope:` field), and AGENTS.md.
      Critique the plan, select a variant, produce task breakdown (04-decision.md).
      Update the scope-relevant SDS with selected variant's design details.
      Create feature branch and draft PR.
      Output: {{node_dir}}/04-decision.md
    validate:
      - type: file_exists
        path: "{{node_dir}}/04-decision.md"
      - type: file_not_empty
        path: "{{node_dir}}/04-decision.md"
      - type: contains_section
        path: "{{node_dir}}/04-decision.md"
        value: "Summary"

  # Stages 4-5: Developer + QA loop (body nodes defined inline)
  implementation:
    type: loop
    phase: impl
    label: "Developer+QA Implementation Loop"
    inputs: [decision]
    condition_node: verify
    condition_field: verdict
    exit_value: PASS
    max_iterations: 3
    nodes:
      build:
        type: agent
        label: "Developer — Implementation"
        inputs: [decision]
        prompt: ".auto-flow/agents/agent-developer/SKILL.md"
        task_template: |
          Read the decision at {{input.decision}}/04-decision.md.
          Read ONLY scope-relevant SRS/SDS docs (derive scope from decision's spec reference or task context).
          Implement the changes following the task breakdown.
          This is iteration {{loop.iteration}}.
          After deno task check passes, write {{node_dir}}/06-impl-summary.md
          with a ## Summary section listing files changed, tests added/modified, and check status.
        validate:
          - type: custom_script
            path: "deno task check"
          - type: file_exists
            path: "{{node_dir}}/06-impl-summary.md"
          - type: contains_section
            path: "{{node_dir}}/06-impl-summary.md"
            value: "Summary"
      verify:
        type: agent
        label: "QA — Verification"
        inputs: [specification, decision, build]
        prompt: ".auto-flow/agents/agent-qa/SKILL.md"
        task_template: |
          Verify the implementation against the spec at {{input.specification}}/01-spec.md.
          Check the decision at {{input.decision}}/04-decision.md.
          Run deno task check and verify all acceptance criteria.
          Post verdict as PR review (approve or request-changes).
          Output: {{node_dir}}/05-qa-report.md with YAML frontmatter containing verdict: PASS or FAIL
        validate:
          - type: file_exists
            path: "{{node_dir}}/05-qa-report.md"
          - type: file_not_empty
            path: "{{node_dir}}/05-qa-report.md"
          - type: contains_section
            path: "{{node_dir}}/05-qa-report.md"
            value: "Summary"

  # Post-pipeline 1: Meta-Agent — prompt optimization
  optimize:
    type: agent
    phase: report
    label: "Meta-Agent — Prompt Optimization"
    model: claude-opus-4-6
    prompt: ".auto-flow/agents/agent-meta-agent/SKILL.md"
    task_template: |
      Read your memory at documents/meta.md first.
      Analyze logs from run {{run_id}} at {{run_dir}}.
      Diagnose problems in agent behavior and fix their prompts in .auto-flow/agents/agent-*/SKILL.md.
      Update documents/meta.md with findings and fix outcomes.
      Write minimal changelog: {{node_dir}}/07-changelog.md
    run_on: always
    after: "deno task dashboard --run-dir {{run_dir}} || true"
    settings:
      on_error: continue
    validate:
      - type: file_exists
        path: "{{node_dir}}/07-changelog.md"
      - type: file_not_empty
        path: "{{node_dir}}/07-changelog.md"
      - type: contains_section
        path: "{{node_dir}}/07-changelog.md"
        value: "Summary"

  # Post-pipeline 2: Tech Lead Review — final review + CI gate + merge
  tech-lead-review:
    type: agent
    phase: report
    label: "Tech Lead Review — Final Review + CI + Merge"
    inputs: [specification, decision]
    prompt: ".auto-flow/agents/agent-tech-lead-review/SKILL.md"
    task_template: |
      Perform final code review of the PR.
      Read the spec at {{input.specification}}/01-spec.md for acceptance criteria.
      Read the decision at {{input.decision}}/04-decision.md for scope.
      Check CI status. Merge PR if all checks pass, or leave open with review comments.
      Output: {{node_dir}}/08-review.md
    run_on: always
    settings:
      on_error: continue
    validate:
      - type: file_exists
        path: "{{node_dir}}/08-review.md"
      - type: file_not_empty
        path: "{{node_dir}}/08-review.md"
      - type: contains_section
        path: "{{node_dir}}/08-review.md"
        value: "Summary"
