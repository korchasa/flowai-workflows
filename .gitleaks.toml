title = "flowai-pipelines gitleaks config"

[allowlist]
  description = "Allow documentation files that reference secret patterns"
  paths = [
    '''documents/requirements\.md''',
    '''documents/design\.md''',
    '''\.flowai-pipelines/agents/agent-.*/SKILL\.md''',
    '''\.flowai-pipelines/tasks/.*\.md''',
    '''\.flowai-pipelines/runs/.*''',
    '''CLAUDE\.md''',
    '''AGENTS\.md''',
  ]
