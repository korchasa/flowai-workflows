# SDLC workflow: 6-agent DAG for GitHub-issue-driven development.
# Pipeline: PM -> Architect -> Tech Lead -> (Developer <-> QA loop) -> Tech Lead Review
#
# Template placeholders (regex-replaced by `flowai-workflow init`):
#   __PROJECT_NAME__   — project identifier used in workflow name and branch prefix
#   __DEFAULT_BRANCH__ — base branch for PRs (e.g. main, master)
#   __TEST_CMD__       — project test command
#   __LINT_CMD__       — project lint/format/check command used as build gate

name: "__PROJECT_NAME__-sdlc"
version: "1"

defaults:
  max_parallel: 2
  max_continuations: 3
  timeout_seconds: 1800
  max_retries: 3
  retry_delay_seconds: 5
  model: claude-sonnet-4-6
  permission_mode: bypassPermissions
  hitl:
    ask_script: .flowai-workflow/scripts/hitl-ask.sh
    check_script: .flowai-workflow/scripts/hitl-check.sh
    artifact_source: "{{input.specification}}/01-spec.md"
    poll_interval: 60
    timeout: 7200
    exclude_login: "github-actions[bot]"

phases:
  plan: [specification, design, decision]
  impl: [implementation]
  report: [tech-lead-review]

nodes:
  # Stage 1: Project Manager — specification
  specification:
    type: agent
    label: "Project Manager — Specification"
    system_prompt: |
      {{file(".flowai-workflow/agents/agent-pm.md")}}
    prompt: |
      {{file(".flowai-workflow/memory/reflection-protocol.md")}}
      Memory: .flowai-workflow/memory/agent-pm.md
      History: .flowai-workflow/memory/agent-pm-history.md
      ---
      Triage open GitHub issues: check health, select best candidate by priority.
      Output: {{node_dir}}/01-spec.md with YAML frontmatter containing the `issue: <N>` field,
      followed by problem statement, acceptance criteria, and scope boundaries.
    validate:
      - type: artifact
        path: "{{node_dir}}/01-spec.md"
        sections: [
          "Problem Statement",
          "Acceptance Criteria",
          "Scope",
          "Summary",
        ]
      - type: frontmatter_field
        path: "{{node_dir}}/01-spec.md"
        field: issue

  # Stage 2: Architect — implementation plan with variants
  design:
    type: agent
    label: "Architect — Design-Solution Plan"
    model: claude-opus-4-6
    inputs: [specification]
    system_prompt: |
      {{file(".flowai-workflow/agents/agent-architect.md")}}
    prompt: |
      {{file(".flowai-workflow/memory/reflection-protocol.md")}}
      Memory: .flowai-workflow/memory/agent-architect.md
      History: .flowai-workflow/memory/agent-architect-history.md
      ---
      Read the specification at {{input.specification}}/01-spec.md.
      Explore the codebase to identify affected files.
      Produce an implementation plan with 2-3 variants.
      Output: {{node_dir}}/02-plan.md
    validate:
      - type: artifact
        path: "{{node_dir}}/02-plan.md"
        sections: ["Summary"]

  # Stage 3: Tech Lead — critique, decision, branch + draft PR
  decision:
    type: agent
    label: "Tech Lead — Decision + Branch + PR"
    model: claude-opus-4-6
    inputs: [specification, design]
    system_prompt: |
      {{file(".flowai-workflow/agents/agent-tech-lead.md")}}
    prompt: |
      {{file(".flowai-workflow/memory/reflection-protocol.md")}}
      Memory: .flowai-workflow/memory/agent-tech-lead.md
      History: .flowai-workflow/memory/agent-tech-lead-history.md
      ---
      Read the plan at {{input.design}}/02-plan.md.
      Read the spec at {{input.specification}}/01-spec.md.
      Critique the plan, select a variant, produce task breakdown.
      Create a feature branch (or rebase existing onto origin/__DEFAULT_BRANCH__) and open a draft PR.
      Output: {{node_dir}}/03-decision.md
    validate:
      - type: artifact
        path: "{{node_dir}}/03-decision.md"
        sections: ["Summary"]

  # Stages 4-5: Developer + QA loop (body nodes defined inline)
  implementation:
    type: loop
    label: "Developer+QA Implementation Loop"
    inputs: [specification, decision]
    condition_node: verify
    condition_field: verdict
    exit_value: PASS
    max_iterations: 3
    nodes:
      build:
        type: agent
        label: "Developer — Implementation"
        inputs: [decision]
        system_prompt: |
          {{file(".flowai-workflow/agents/agent-developer.md")}}
        prompt: |
          {{file(".flowai-workflow/memory/reflection-protocol.md")}}
          Memory: .flowai-workflow/memory/agent-developer.md
          History: .flowai-workflow/memory/agent-developer-history.md
          ---
          Read the decision at {{input.decision}}/03-decision.md.
          Implement the changes following the task breakdown.
          This is iteration {{loop.iteration}}.
          Run `__LINT_CMD__` to verify the build gate.
          After the gate passes, write {{node_dir}}/04-impl-summary.md with a
          ## Summary section listing files changed, tests added/modified, and check status.
        validate:
          - type: custom_script
            path: "__LINT_CMD__"
          - type: artifact
            path: "{{node_dir}}/04-impl-summary.md"
            sections: ["Summary"]
      verify:
        type: agent
        label: "QA — Verification"
        inputs: [specification, decision, build]
        system_prompt: |
          {{file(".flowai-workflow/agents/agent-qa.md")}}
        prompt: |
          {{file(".flowai-workflow/memory/reflection-protocol.md")}}
          Memory: .flowai-workflow/memory/agent-qa.md
          History: .flowai-workflow/memory/agent-qa-history.md
          ---
          Verify the implementation against the spec at {{input.specification}}/01-spec.md.
          Check the decision at {{input.decision}}/03-decision.md.
          Run `__LINT_CMD__` and `__TEST_CMD__` and verify all acceptance criteria.
          Post verdict as PR review (approve or request-changes).
          Output: {{node_dir}}/05-qa-report.md with YAML frontmatter containing verdict: PASS or FAIL
        validate:
          - type: artifact
            path: "{{node_dir}}/05-qa-report.md"
            sections: ["Summary"]
          - type: frontmatter_field
            path: "{{node_dir}}/05-qa-report.md"
            field: verdict
            allowed: [PASS, FAIL]

  # Post-workflow: Tech Lead Review — final review + CI gate + merge
  tech-lead-review:
    type: agent
    label: "Tech Lead Review — Final Review + CI + Merge"
    inputs: [specification, decision]
    system_prompt: |
      {{file(".flowai-workflow/agents/agent-tech-lead-review.md")}}
    prompt: |
      {{file(".flowai-workflow/memory/reflection-protocol.md")}}
      Memory: .flowai-workflow/memory/agent-tech-lead-review.md
      History: .flowai-workflow/memory/agent-tech-lead-review-history.md
      ---
      Perform final code review of the PR.
      Read the spec at {{input.specification}}/01-spec.md for acceptance criteria.
      Read the decision at {{input.decision}}/03-decision.md for scope.
      Check CI status. Merge PR if all checks pass, or leave open with review comments.
      Output: {{node_dir}}/06-review.md
    run_on: always
    settings:
      on_error: continue
    validate:
      - type: artifact
        path: "{{node_dir}}/06-review.md"
        sections: ["Summary"]
