name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default permissions cover check (tag push) and publish-github
# (release create). publish-jsr overrides with id-token: write for
# OIDC trusted publishing and downgrades contents to read-only.
permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.create-release.outputs.released }}
      tag: ${{ steps.create-release.outputs.tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run checks
        run: deno task check

      - name: Verify JSR publish (dry-run)
        run: deno publish --dry-run --allow-dirty

      - name: Verify no files modified by check
        run: |
          if ! git diff --exit-code; then
            echo "::error::Check modified files — commit these changes"
            git diff --stat
            exit 1
          fi

      - name: Create release and push tags
        id: create-release
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, 'chore(release):')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Detect releasable commits and pick a bump level.
          #
          # Conventional-commit prefixes (feat/fix/...) are handled by
          # standard-version directly. Project-style engine: and
          # engine+sdlc: prefixes are detected here and forced to a
          # patch bump because standard-version does not understand
          # them. sdlc: commits do NOT trigger a release — SDLC workflow
          # changes are dev tooling, not engine code.
          RELEASABLE=false
          BUMP_ARGS=""

          if [ -z "$LATEST_TAG" ]; then
            RELEASABLE=true
          else
            COMMITS_SINCE=$(git log --format='%s' ${LATEST_TAG}..HEAD)
            if echo "$COMMITS_SINCE" | grep -qE '^feat'; then
              RELEASABLE=true
              # standard-version decides minor/major automatically.
            elif echo "$COMMITS_SINCE" | grep -qE '^(fix|perf|refactor|build|engine)'; then
              RELEASABLE=true
              BUMP_ARGS="--release-as patch"
            fi
          fi

          if [ "$RELEASABLE" = "true" ]; then
            deno task release $BUMP_ARGS
            NEW_VERSION=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
            NEW_TAG="v${NEW_VERSION}"
            git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
            git push origin main "$NEW_TAG"

            echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "Nothing to release"
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  # Reads scripts/targets.json (single source of truth, also consumed by
  # scripts/compile.ts) and emits a GitHub Actions matrix. Keeping the list
  # in one file prevents drift between the local compile script and CI.
  setup-matrix:
    name: Resolve build matrix
    needs: check
    if: needs.check.outputs.released == 'true'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.check.outputs.tag }}

      - name: Build matrix from scripts/targets.json
        id: targets
        run: echo "matrix=$(jq -c . scripts/targets.json)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: [check, setup-matrix]
    if: needs.check.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Compile
        env:
          VERSION: ${{ needs.check.outputs.tag }}
        run: deno task compile --target ${{ matrix.target }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # Creates the GitHub Release with cross-compiled binaries attached.
  # Waits for the build matrix because it needs the compiled artifacts.
  publish-github:
    name: Publish GitHub Release
    needs: [check, build]
    if: needs.check.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.check.outputs.tag }}
          fetch-depth: 0

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${{ needs.check.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          NOTES_FILE=$(mktemp)
          if [ -n "$PREV_TAG" ]; then
            deno run -A scripts/generate-release-notes.ts "$PREV_TAG" "$CURRENT_TAG" "${{ github.repository }}" > "$NOTES_FILE"
          else
            echo "Initial release" > "$NOTES_FILE"
          fi
          echo "notes_file=${NOTES_FILE}" >> $GITHUB_OUTPUT

      - name: Create release and attach binaries
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        # dist/ contains only files produced by the matrixed build job
        # (download-artifact with merge-multiple flattens artifacts into
        # dist/). Using a glob removes the last hardcoded copy of the
        # target list — the matrix itself is derived from targets.json.
        run: |
          gh release create "${{ needs.check.outputs.tag }}" \
            --title "flowai-workflow ${{ needs.check.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            dist/*

  # Publishes the TypeScript package to JSR. Depends only on `check`
  # (which creates the tag), NOT on `build` — JSR ships source files,
  # not cross-compiled binaries, so this runs in parallel with the
  # build matrix and shaves ~15s off end-to-end release time.
  # A JSR publish failure does not block the GitHub release.
  publish-jsr:
    name: Publish to JSR
    needs: check
    if: needs.check.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      # Only id-token is needed for OIDC trusted publishing.
      # contents: read is for checkout.
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Publish to JSR
        run: deno publish
