name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.create-release.outputs.released }}
      tag: ${{ steps.create-release.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run checks
        run: deno task check

      - name: Verify no files modified by check
        run: |
          if ! git diff --exit-code; then
            echo "::error::Check modified files — commit these changes"
            git diff --stat
            exit 1
          fi

      - name: Create release and push tags
        id: create-release
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          !contains(github.event.head_commit.message, 'chore(release):')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            RELEASABLE=true
          else
            COMMITS=$(git log --oneline --extended-regexp --grep="^(feat|fix|perf|break|refactor|build)" ${LATEST_TAG}..HEAD | wc -l)
            if [ "$COMMITS" -gt 0 ]; then RELEASABLE=true; else RELEASABLE=false; fi
          fi

          if [ "$RELEASABLE" = "true" ]; then
            deno task release
            NEW_VERSION=$(deno eval "console.log(JSON.parse(Deno.readTextFileSync('deno.json')).version)")
            NEW_TAG="v${NEW_VERSION}"
            git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
            git push origin main "$NEW_TAG"

            echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "Nothing to release"
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: check
    if: needs.check.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: flowai-workflow-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: flowai-workflow-linux-arm64
          - target: x86_64-apple-darwin
            artifact: flowai-workflow-darwin-x86_64
          - target: aarch64-apple-darwin
            artifact: flowai-workflow-darwin-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        env:
          VERSION: ${{ needs.check.outputs.tag }}
        run: deno task compile --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: [check, build]
    if: needs.check.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${{ needs.check.outputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          NOTES_FILE=$(mktemp)
          if [ -n "$PREV_TAG" ]; then
            deno run -A scripts/generate-release-notes.ts "$PREV_TAG" "$CURRENT_TAG" "${{ github.repository }}" > "$NOTES_FILE"
          else
            echo "Initial release" > "$NOTES_FILE"
          fi
          echo "notes_file=${NOTES_FILE}" >> $GITHUB_OUTPUT

      - name: Create release and attach binaries
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ needs.check.outputs.tag }}" \
            --title "flowai-workflow ${{ needs.check.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            dist/flowai-workflow-linux-x86_64 \
            dist/flowai-workflow-linux-arm64 \
            dist/flowai-workflow-darwin-x86_64 \
            dist/flowai-workflow-darwin-arm64
