# Pipeline configuration — 9-node SDLC flow (FR-26, FR-33).
# DAG: specification → design → decision → implementation(build, verify)
#      ; optimize(run_on:always) → finalize → review
# See: documents/requirements.md for stage specifications.

name: "auto-flow-sdlc"
version: "1"

defaults:
  max_parallel: 2
  max_continuations: 3
  timeout_seconds: 1800
  max_retries: 3
  retry_delay_seconds: 5
  model: claude-sonnet-4-6
  claude_args:
    - "--dangerously-skip-permissions"
  hitl:
    ask_script: .sdlc/scripts/hitl-ask.sh
    check_script: .sdlc/scripts/hitl-check.sh
    issue_source: plan/specification/01-spec.md
    poll_interval: 60
    timeout: 7200
    bot_login: "github-actions[bot]"

phases:
  plan: [specification, design, decision]
  impl: [implementation]
  report: [optimize, finalize, review]

nodes:
  # Stage 1: Project Manager — specification
  specification:
    type: agent
    phase: plan
    label: "Project Manager — Specification"
    prompt: "agents/pm/SKILL.md"
    task_template: |
      Select a GitHub issue to implement. Prefer issues labeled "in-progress"; fall back to any open issue.
      Output:
        - {{node_dir}}/01-spec.md (YAML frontmatter with `issue: <N>`,
          then problem, affected requirements, SRS changes, scope)
        - Update documents/requirements.md with new/modified requirements
    validate:
      - type: file_exists
        path: "{{node_dir}}/01-spec.md"
      - type: file_not_empty
        path: "{{node_dir}}/01-spec.md"
      - type: frontmatter_field
        path: "{{node_dir}}/01-spec.md"
        field: issue
      - type: contains_section
        path: "{{node_dir}}/01-spec.md"
        value: "Problem Statement"
      - type: contains_section
        path: "{{node_dir}}/01-spec.md"
        value: "Scope"

  # Stage 2: Architect — design-solution plan with variants
  design:
    type: agent
    phase: plan
    label: "Architect — Design-Solution Plan"
    model: claude-opus-4-6
    inputs: [specification]
    prompt: "agents/architect/SKILL.md"
    task_template: |
      Read the specification at {{input.specification}}/01-spec.md.
      Read documents/requirements.md and documents/design.md.
      Produce an implementation plan with 2-3 variants.
      Output: {{node_dir}}/02-plan.md
    validate:
      - type: file_exists
        path: "{{node_dir}}/02-plan.md"
      - type: file_not_empty
        path: "{{node_dir}}/02-plan.md"

  # Stage 3: Tech Lead — critique, decision, SDS update, branch + draft PR
  decision:
    type: agent
    phase: plan
    label: "Tech Lead — Decision + Branch + PR"
    model: claude-opus-4-6
    inputs: [specification, design]
    prompt: "agents/tech-lead/SKILL.md"
    task_template: |
      Read the plan at {{input.design}}/02-plan.md.
      Read the spec at {{input.specification}}/01-spec.md.
      Read documents/requirements.md, documents/design.md, and AGENTS.md.
      Critique the plan, select a variant, produce task breakdown (04-decision.md).
      Update documents/design.md with selected variant's design details.
      Create feature branch and draft PR.
      Output: {{node_dir}}/04-decision.md
    validate:
      - type: file_exists
        path: "{{node_dir}}/04-decision.md"
      - type: file_not_empty
        path: "{{node_dir}}/04-decision.md"

  # Stages 4-5: Executor + QA loop (body nodes defined inline)
  implementation:
    type: loop
    phase: impl
    label: "Executor+QA Implementation Loop"
    inputs: [decision]
    condition_node: verify
    condition_field: verdict
    exit_value: PASS
    max_iterations: 3
    nodes:
      build:
        type: agent
        label: "Executor — Implementation"
        inputs: [decision]
        prompt: "agents/executor/SKILL.md"
        task_template: |
          Read the decision at {{input.decision}}/04-decision.md.
          Read documents/requirements.md and documents/design.md.
          Implement the changes following the task breakdown.
          This is iteration {{loop.iteration}}.
        validate:
          - type: custom_script
            path: "deno task check"
      verify:
        type: agent
        label: "QA — Verification"
        inputs: [specification, decision, build]
        prompt: "agents/qa/SKILL.md"
        task_template: |
          Verify the implementation against the spec at {{input.specification}}/01-spec.md.
          Check the decision at {{input.decision}}/04-decision.md.
          Run deno task check and verify all acceptance criteria.
          Post verdict as PR review (approve or request-changes).
          Output: {{node_dir}}/05-qa-report.md with YAML frontmatter containing verdict: PASS or FAIL
        validate:
          - type: file_exists
            path: "{{node_dir}}/05-qa-report.md"
          - type: file_not_empty
            path: "{{node_dir}}/05-qa-report.md"

  # Post-pipeline 1: Meta-Agent — prompt optimization
  optimize:
    type: agent
    phase: report
    label: "Meta-Agent — Prompt Optimization"
    model: claude-opus-4-6
    prompt: "agents/meta-agent/SKILL.md"
    task_template: |
      Read your memory at documents/meta.md first.
      Analyze logs from run {{run_id}} at {{run_dir}}.
      Diagnose problems in agent behavior and fix their prompts in agents/*/SKILL.md.
      Update documents/meta.md with findings and fix outcomes.
      Write minimal changelog: {{node_dir}}/07-changelog.md
    run_on: always
    settings:
      on_error: continue
    validate:
      - type: file_exists
        path: "{{node_dir}}/07-changelog.md"
      - type: file_not_empty
        path: "{{node_dir}}/07-changelog.md"

  # Post-pipeline 2: Committer — commit + push + PR
  finalize:
    type: agent
    phase: report
    label: "Committer — Commit, Push & PR"
    inputs: [optimize, specification]
    prompt: "agents/committer/SKILL.md"
    task_template: |
      Commit all uncommitted changes, push, and ensure PR exists.
      Read the spec at {{input.specification}}/01-spec.md for issue number.
      Output: {{node_dir}}/06-summary.md
    run_on: always
    settings:
      on_error: continue
    validate:
      - type: file_exists
        path: "{{node_dir}}/06-summary.md"
      - type: file_not_empty
        path: "{{node_dir}}/06-summary.md"

  # Post-pipeline 3: Code Review — quality check only (no merge)
  review:
    type: agent
    phase: report
    label: "Code Review — Quality Check"
    inputs: [finalize, specification, decision]
    prompt: "agents/code-reviewer/SKILL.md"
    task_template: |
      Perform final code review of the PR.
      Read the spec at {{input.specification}}/01-spec.md for acceptance criteria.
      Read the decision at {{input.decision}}/04-decision.md for scope.
      Post review as PR comment (approve or request-changes). Do NOT merge.
      Output: {{node_dir}}/08-review.md
    run_on: always
    settings:
      on_error: continue
    validate:
      - type: file_exists
        path: "{{node_dir}}/08-review.md"
      - type: file_not_empty
        path: "{{node_dir}}/08-review.md"
