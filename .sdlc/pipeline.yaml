# Default pipeline configuration — reproduces the current 9-stage SDLC flow.
# See: documents/requirements.md for stage specifications.

name: "auto-flow-sdlc"
version: "1"

defaults:
  max_parallel: 2
  max_continuations: 3
  timeout_seconds: 1800
  max_retries: 3
  retry_delay_seconds: 5
  claude_args:
    - "--dangerously-skip-permissions"
  hitl:
    ask_script: .sdlc/scripts/hitl-ask.sh
    check_script: .sdlc/scripts/hitl-check.sh
    issue_source: pm/01-spec.md
    poll_interval: 60
    timeout: 7200
    bot_login: "github-actions[bot]"

nodes:
  # Stage 1: Project Manager — specification
  pm:
    type: agent
    label: "Project Manager — Specification"
    prompt: "agents/pm/SKILL.md"
    task_template: |
      Triage open GitHub issues and select the highest-priority one to implement.
      Output:
        - {{node_dir}}/01-spec.md (YAML frontmatter with `issue: <N>`,
          then problem, affected requirements, SRS changes, scope)
        - Update documents/requirements.md with new/modified requirements
    validate:
      - type: file_exists
        path: "{{node_dir}}/01-spec.md"
      - type: file_not_empty
        path: "{{node_dir}}/01-spec.md"
      - type: frontmatter_field
        path: "{{node_dir}}/01-spec.md"
        field: issue
      - type: contains_section
        path: "{{node_dir}}/01-spec.md"
        value: "Problem Statement"
      - type: contains_section
        path: "{{node_dir}}/01-spec.md"
        value: "Scope"

  # Stage 2: Tech Lead — plan with variants
  tech-lead:
    type: agent
    label: "Tech Lead — Implementation Plan"
    inputs: [pm]
    prompt: "agents/tech-lead/SKILL.md"
    task_template: |
      Read the specification at {{input.pm}}/01-spec.md.
      Read documents/requirements.md and documents/design.md.
      Produce an implementation plan with 2-3 variants.
      Output: {{node_dir}}/02-plan.md
    validate:
      - type: file_exists
        path: "{{node_dir}}/02-plan.md"
      - type: file_not_empty
        path: "{{node_dir}}/02-plan.md"

  # Stage 3: Reviewer — critique and revision
  reviewer:
    type: agent
    label: "Tech Lead Reviewer — Critique & Revision"
    inputs: [pm, tech-lead]
    prompt: "agents/tech-lead-reviewer/SKILL.md"
    task_template: |
      Review the plan at {{input.tech-lead}}/02-plan.md.
      Read the spec at {{input.pm}}/01-spec.md.
      Produce a revised plan with critique and recommendation.
      Output: {{node_dir}}/03-revised-plan.md
    validate:
      - type: file_exists
        path: "{{node_dir}}/03-revised-plan.md"
      - type: file_not_empty
        path: "{{node_dir}}/03-revised-plan.md"

  # Stage 4: Architect — variant selection and task breakdown
  architect:
    type: agent
    label: "Architect — Decision & Task Breakdown"
    inputs: [pm, reviewer]
    prompt: "agents/architect/SKILL.md"
    task_template: |
      Read the revised plan at {{input.reviewer}}/03-revised-plan.md.
      Read the spec at {{input.pm}}/01-spec.md.
      Select a variant and produce a task breakdown with YAML frontmatter.
      Output: {{node_dir}}/04-decision.md
    validate:
      - type: file_exists
        path: "{{node_dir}}/04-decision.md"
      - type: file_not_empty
        path: "{{node_dir}}/04-decision.md"

  # Stage 5: SDS Update
  sds-update:
    type: agent
    label: "Tech Lead — SDS Update"
    inputs: [architect]
    prompt: "agents/tech-lead-sds/SKILL.md"
    task_template: |
      Read the decision at {{input.architect}}/04-decision.md.
      Update documents/design.md with the selected variant's design details.
      Output: updated documents/design.md
    after: "git diff HEAD -- documents/design.md > {{node_dir}}/04a-sds-diff.md; [ -s {{node_dir}}/04a-sds-diff.md ] || echo 'No changes to documents/design.md' > {{node_dir}}/04a-sds-diff.md || true"

  # Commit planning artifacts
  commit-plan:
    type: agent
    label: "Commit planning artifacts"
    prompt: agents/committer/SKILL.md
    inputs: [sds-update]
    task_template: |
      Stage and commit all changes for the plan phase.
    env:
      SDLC_PHASE: plan

  # Stages 6-7: Executor + QA loop
  executor:
    type: agent
    label: "Executor — Implementation"
    inputs: [architect, sds-update]
    prompt: "agents/executor/SKILL.md"
    task_template: |
      Read the decision at {{input.architect}}/04-decision.md.
      Read documents/requirements.md and documents/design.md.
      Implement the changes following the task breakdown.
      This is iteration {{loop.iteration}}.
    validate:
      - type: custom_script
        path: "deno task check"

  qa:
    type: agent
    label: "QA — Verification"
    inputs: [pm, architect, executor]
    prompt: "agents/qa/SKILL.md"
    task_template: |
      Verify the implementation against the spec at {{input.pm}}/01-spec.md.
      Check the decision at {{input.architect}}/04-decision.md.
      Run deno task check and verify all acceptance criteria.
      Output: {{node_dir}}/05-qa-report.md with YAML frontmatter containing verdict: PASS or FAIL
    validate:
      - type: file_exists
        path: "{{node_dir}}/05-qa-report.md"
      - type: file_not_empty
        path: "{{node_dir}}/05-qa-report.md"

  impl-loop:
    type: loop
    label: "Executor+QA Implementation Loop"
    inputs: [commit-plan]
    body: [executor, qa]
    condition_node: qa
    condition_field: verdict
    exit_value: PASS
    max_iterations: 3

  # Commit implementation
  commit-impl:
    type: agent
    label: "Commit implementation"
    prompt: agents/committer/SKILL.md
    inputs: [impl-loop]
    task_template: |
      Stage and commit all changes for the impl phase.
    env:
      SDLC_PHASE: impl

  # Stage 8: Presenter — change summary
  presenter:
    type: agent
    label: "Presenter — Change Summary"
    inputs: [pm, architect, commit-impl]
    prompt: "agents/presenter/SKILL.md"
    task_template: |
      Create a summary of all changes made during the pipeline.
      Read the spec at {{input.pm}}/01-spec.md.
      Read the decision at {{input.architect}}/04-decision.md.
      Read issue number from {{input.pm}}/01-spec.md frontmatter.
      Create a PR targeting main and post a summary comment on that issue.
      Output: {{node_dir}}/06-summary.md
    validate:
      - type: file_exists
        path: "{{node_dir}}/06-summary.md"
      - type: file_not_empty
        path: "{{node_dir}}/06-summary.md"

  # Commit presentation artifacts
  commit-present:
    type: agent
    label: "Commit presentation artifacts"
    prompt: agents/committer/SKILL.md
    inputs: [presenter]
    task_template: |
      Stage and commit all changes for the present phase.
    env:
      SDLC_PHASE: present

  # Stage 9: Meta-Agent — prompt optimization
  meta-agent:
    type: agent
    label: "Meta-Agent — Prompt Analysis"
    prompt: "agents/meta-agent/SKILL.md"
    task_template: |
      Analyze all logs and artifacts from run {{run_id}} at {{run_dir}}.
      Produce a meta-report with prompt improvement suggestions.
      Output: {{node_dir}}/07-meta-report.md
    run_always: true
    settings:
      on_error: continue
    validate:
      - type: file_exists
        path: "{{node_dir}}/07-meta-report.md"
