# SDLC workflow template for Claude Code runtime.
# 6-agent DAG: PM -> Architect -> Tech Lead -> Developer/QA loop -> Tech Lead Review.
#
# Agent prompts are framework-independent: no references to FR numbering,
# documentation-hierarchy conventions, or any specific tech stack. Build gate
# and test commands are parameterized via __LINT_CMD__ / __TEST_CMD__
# placeholders, filled by `flowai-workflow init` from the wizard.
#
# All workflow assets (agents, memory, scripts, config, metadata) live under
# a single `.flowai-workflow/` directory in the target project — nothing is
# written to `.claude/agents/` or any other location outside this tree.

name: "sdlc-claude"
version: "1"
description: "6-agent SDLC workflow for Claude Code (PM -> Arch -> TL -> Dev/QA -> TLR)"

requires:
  - { kind: git_remote, host: "github.com" }

# Wizard questions. Each `detect:` key maps to a handler in
# cli/init/autodetect.ts. First non-undefined handler wins; user confirms
# or edits in the interactive wizard.
questions:
  - key: PROJECT_NAME
    label: "Project name"
    detect: project_name
    required: true
  - key: DEFAULT_BRANCH
    label: "Default branch"
    detect: default_branch
    default: "main"
  - key: TEST_CMD
    label: "Test command"
    detect: test_cmd
    default: ""
  - key: LINT_CMD
    label: "Lint/format check command"
    detect: lint_cmd
    default: ""

# Files copied into the target project. Placeholders __UPPER_SNAKE__
# are regex-replaced with wizard answer values during copy.
files:
  copy:
    - from: "files/.flowai-workflow/**"
      to: ".flowai-workflow/"
